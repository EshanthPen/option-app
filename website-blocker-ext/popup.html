<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      text-align: center;
      background: var(--bg, #FAFAFA);
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: var(--ink, #0D0C0A);
    }
    p {
      font-size: 13px;
      color: var(--ink3, #737373);
      margin-bottom: 20px;
    }
    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .status.active {
      background: var(--surface2, #E8F5E9);
      color: var(--green, #2E7D32);
    }
    .status.inactive {
      background: var(--surface, #F5F5F5);
      color: var(--ink3, #757575);
    }
    button {
      background: var(--ink, #0D0C0A);
      color: var(--bg, white);
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h2>Option Blocker</h2>
  <div id="statusBadge" class="status inactive">Checking status...</div>
  <p id="domainsText">Log in to the Option App to manage your focus sessions.</p>
  <button id="toggleFocusBtn" style="margin-bottom: 8px;">Toggle Focus</button>
  <button id="openAppBtn" style="background: var(--surface2, #E5E5E5); color: var(--ink, #121212);">Open Option App</button>
  <script src="popup.js"></script>
</body>
</html>
