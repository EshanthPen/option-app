<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      text-align: center;
      background: #FAFAFA;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #0D0C0A;
    }
    p {
      font-size: 13px;
      color: #737373;
      margin-bottom: 20px;
    }
    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .status.active {
      background: #E8F5E9;
      color: #2E7D32;
    }
    .status.inactive {
      background: #F5F5F5;
      color: #757575;
    }
    button {
      background: #0D0C0A;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: #262626;
    }
  </style>
</head>
<body>
  <h2>Option Blocker</h2>
  <div id="statusBadge" class="status inactive">Checking status...</div>
  <p id="domainsText">Log in to the Option App to manage your focus sessions.</p>
  <button id="openAppBtn">Open Option App</button>
  <script src="popup.js"></script>
</body>
</html>
