<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Site Blocked - Focus Active</title>
    <style>
        body {
            background-color: var(--bg, #121212);
            color: var(--ink, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: var(--surface, #1e1e1e);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border, #333);
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .shield-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        p {
            color: var(--ink3, #aaaaaa);
            margin: 0 0 30px 0;
            font-size: 15px;
            line-height: 1.5;
        }
        .timer-container {
            background-color: var(--surface2, #2a2a2a);
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .timer-text {
            font-size: 14px;
            color: var(--ink3, #888);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .timer {
            font-family: monospace;
            font-size: 28px;
            font-weight: bold;
            color: var(--green, #4ade80); /* SEM.green equivalent */
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield-icon">🛡️</div>
        <h1>Site Blocked</h1>
        <p>This website is on your blacklist. Get back to work and stay locked in.</p>
        
        <div class="timer-container">
            <span class="timer-text">Focused for</span>
            <span class="timer" id="focusTimer">00:00</span>
        </div>
    </div>
    <script src="blocked.js"></script>
</body>
</html>
