<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Option - Focus Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">O</div>
        <h1>Option</h1>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="masterToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-bar" id="statusBar">
      <span class="status-dot active"></span>
      <span id="statusText">Blocking active</span>
      <span id="blockedCount" class="badge">0</span>
    </div>

    <!-- Preset Categories -->
    <div class="section">
      <h2>Preset Categories</h2>
      <div class="presets" id="presetList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Custom Sites -->
    <div class="section">
      <h2>Custom Blocked Sites</h2>
      <div class="add-site">
        <input type="text" id="customSiteInput" placeholder="e.g. reddit.com" />
        <button id="addSiteBtn" class="btn-add">+</button>
      </div>
      <div class="custom-list" id="customList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Made with focus by Option App</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
